name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema requests pytest

      - name: Run pytest suite (parser/grammar/identity/replay/frequencies/refresh/fetch/backfill)
        # PYTHONPATH=pipeline is required so `import bc_pipeline` resolves without an
        # install -- see pipeline/tests/conftest.py and the README's "Testing" note.
        # Covers both suites: repo-root tests/ (parse/grammar/identity/replay/serialize)
        # and pipeline/tests/ (fetch/backfill/completeness/frequencies/refresh/config).
        run: PYTHONPATH=pipeline python -m pytest tests pipeline/tests -q

      - name: Validate game files against the schema
        run: python scripts/validate_games.py

      - name: Check frozen schema invariants
        run: python scripts/check_schema_invariants.py

      - name: Validate frequency artifact against its schema
        run: python scripts/validate_frequencies.py
